<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Estoque</h1>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Cadastrar Produto:</h2>
            <form id="form-produto">
                <div class="form-group">
                    <label for="nome-produto">Nome do produto:</label>
                    <input type="text" id="nome-produto" required placeholder="Ex: Placa de vídeo">
                </div>
                <div class="form-group">
                    <label for="qtde-produto">Quantidade:</label>
                    <input type="number" id="qtde-produto" required min="0" placeholder="Ex: 2">
                </div>
                <div class="form-group">
                    <label for="preco-produto">Preço Unitário: R$</label>
                    <input type="number" id="preco-produto" required min="0" step="0.01" placeholder="Ex: 299,90">
                </div>
                <button type="submit" id="btn-salvar">Salvar</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Produtos em estoque</h2>
            <table id="inventario-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="inventario-list">
                    <tr>
                        <td colspan="5" class="empty-msg">
                            Nenhum produto cadastrado ainda.
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
